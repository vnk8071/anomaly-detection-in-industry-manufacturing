model:
  class_path: anomalib.models.Patchcore
  init_args:
    backbone: resnet18
    layers:
      - layer2
      - layer3
    pre_trained: true
    coreset_sampling_ratio: 0.1
    num_neighbors: 9

data:
  class_path: anomalib.data.Folder
  init_args:
    name: custom
    root: ./data/custom
    normal_dir: train/good
    abnormal_dir: test/defect
    train_batch_size: 32
    eval_batch_size: 1

trainer:
  accelerator: auto
  devices: 1
  max_epochs: 1
  default_root_dir: ./results
