{% extends 'base.html' %}

{% block content %}
<div class="content-row">
    <div class="content-column">
        <center>
            <h3>Input image</h3>
            <img class="center" src="{{ image_upload }}" width="80%">
            <h4>Mask predict</h4>
            <img class="center" src="{{ mask_predict }}" width="80%">
        </center>
    </div>
    <div class="content-column">
        <center>
            <h3>Prediction</h3>
            <h4>Anomaly Score: {{ '%.3f' % anomaly_score }}</h4>
            <h4>Target label: {{ target }}</h4>
            <h4>Heatmap predict</h4>
            <img class="center" src="{{ heatmap_predict }}" width="80%">
            <h4>Segment predict</h4>
            <img class="center" src="{{ segment_predict }}" width="80%">
        </center>
    </div>
</div>
<hr>
<center>
    <a href="/inference"><button class="btn btn-outline-primary btn-block" style="width: 50%;">Next predict</button></a>
</center>
{% endblock %}
